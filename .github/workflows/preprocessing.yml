name: Data Preprocessing Automation

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_Muhammad-Faturrohman.py

      - name: Check files
        run: |
          ls
          ls preprocessing
          ls preprocessing/mushrooms_preprocessing

      - name: Commit and Push processed data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add preprocessing/mushrooms_preprocessing/mushrooms_clean.csv

          git commit -m "Auto-update preprocessing dataset" || echo "No changes"

          git push